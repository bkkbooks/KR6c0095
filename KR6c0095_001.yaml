body:
  text: 德清俞樾其一第二分云善男子善女人發阿耨多羅三藐三菩提心應云何住云何降伏其心按心即阿耨多羅三藐三菩提心住者住此心也降伏者降伏此心也俗解謂真心當住使之不退轉妄心當降伏使之不擾亂分別為二殊失語氣且非如來立教之旨也下文佛言應如是住如是降伏其心然詳通篇所言言住者多言降伏者少蓋所謂不住色布施不住聲香味觸法布施皆以不住為住以不住為住則即住即降伏矣其義莫明於第十七分所言此一分本是申説前義語較簡而意轉明也其文曰爾時須菩提白佛言世尊善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心佛告須菩提善男子善女人發阿耨多羅三藐三菩提心者當生如是心我應滅度一切衆生滅度一切衆生已而無有一衆生實滅度者按我應滅度一切衆生即所謂應如是住也滅度一切衆生已而無有一衆生實滅度者即所謂應如是降伏其心也得此數語覆讀第三分則文義了然矣故第四分末云菩薩無住相布施又云菩薩但應如所教住上文住為一義降伏為一義而此文不及降伏蓋言但應如所教住則即住即降伏矣俗解不知謂此住字作止字解不住之住作染著解殊失其旨今以儒理言之子貢問曰有一言而可以終身行之者乎子曰其恕乎己所不欲勿施於人即所謂應如是住也子貢曰我不欲人之加諸我也我亦欲無加諸人子曰賜也非爾所及也即所謂應如是降伏其心也子曰衣敝縕袍與衣狐貉者立而不恥者其由也與不忮不求何用不臧即所謂應如是住也子路終身誦之子曰是道也何足以臧即所謂應如是降伏其心也蓋儒者之言曰實若虗而此經亦言無實無虗若無所住則涉於虗矣而有所住則又滯於實矣故應如是住又應如是降伏其心儒理佛理一以貫之其二第八分云若人滿三千大千世界七寶以用布施是人所得福德寧為多不須菩提言甚多何以故是福德即非福德性是故如來説福德多按性字疑衍文也是福德即非福德乃無實無虗之義第十九分云若有人滿三千大千世界七寶以用布施是人以是因緣得福多不如是世尊此人以是因緣得福甚多須菩提若福德有實當作實有傳寫倒也如來不説得福多以福德無故如來説得福德多兩文語意相近可以發明此云是福德即彼所云福德實有也此云非福德即彼所云福德無也此云是福德即非福德是故如來説福德多彼云若福德實有如來不説得福德多以福德無故如來説得福德多語有繁簡意則一也今衍性字則福德與福性區而為二矣福德在外福德性在內既有內外之分自有是非之判凡夫皆能言之豈得為如來無上甚深之妙旨哉俗解云此等福德是身外享用與我真性全不相關即非福德出於性中者以是為解失之淺矣今以全經體例求之第五分云如來所説身相即非身相豈有兩身相邪第八分云所謂佛法者即非佛法豈有兩佛法邪十三分云佛説般若波羅蜜即非般若波羅蜜豈有兩般若波羅蜜邪推之十四分云是實相者即非實相是故如來説名實相十七分云所言一切法者即非一切法是故名一切法第十八分云如來説諸心者皆為非心是名為心第二十分云如來説具足色身即非具足色身是名具足色身二十三分云所言善法者如來説非善法是名善法第三十分云如來説一合相即非一合相是名一合相三十一分云所言法相者如來説即非法相是名法相全經中如此者甚多並與此文是福德即非福德是故如來説福德多文義一律足證性字之衍矣而尤有可切證者第三十分云若是微塵衆實有者佛則不説是微塵衆所以者何佛説微塵衆即非微塵衆是名微塵衆以是言之微塵衆非實有故非微塵然則福德亦非實有故非福德愚以第十九分所云若福德實有如來不説得福德多證此文所云是福德即非福德是故如來説福德多以經解經塙有明證矣蓋此經大旨在於無實無虗惟其無實無虗是以即非即是所謂應如是住應如是降伏其心也俗解謂住者住其真心降伏者降伏其妄心故於此文福德下增性字見福德是妄福德性是真理雖可通而於全經語意殊不一律徒生葛藤無當經義其三第十四分云如來是真語者實語者如語者不誑語者不異語者按真語實語不誑語不異語皆易解説獨所謂如語者不易解説俗解云默契真如之語苟為推美未合經義愚謂如語即真語實語亦即不誑語不異語也如者如其真如其實也如其真如其實則不誑矣真無二真實無二實則不異矣今淺言之一則曰一二則曰二不增不減所謂如也一則真一二則真二是謂之真一實有一二實有二是謂之實是故如語即真語實語也增一為二減二為一是謂之誑可增為二即可減為一可減為一即可增為二是謂之異是故如語即不誑語不異語也然則真語實語不誑語不異語實不外乎如語而已矣推而言之如來之名即由於此第十七分云如來者即諸法如義所謂如義者如其義而止不增不減也此如來之所以為如也然則何以言如來第二十九分云若有人言如來若來若去若坐若臥是人不解我所説義何以故如來者無所從來亦無所去故名如來以是言之如來者實無所有故來去坐臥皆不足見如來欲見如來當於無來無去見之無來無去則無有也既無有矣安有如來所謂如來者就來者言耳譬如空室之中縣一明鏡其中無有也而人之來者見為人物之來者見為物各如其來者而已矣此所謂如來也雖然此非獨佛理如是雖儒理亦然故易大傳曰仁者見之謂之仁知者見之謂之知百姓日用而不知昔顏淵從夫子遊出而告人曰吾有得於夫子矣宰我子貢有若從夫子遊出而告人曰吾有得於夫子矣夫子之道一也而顏淵得之以為顏淵宰我子貢有若得之以為宰我子貢有若而夫子不知也然則孔子亦如來也其四第二十六分云須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來按第十三分云須菩提於意云何可以三十二相見如來不不也世尊不可以三十二相得見如來是須菩提已知三十二相之不足以見如來矣何以至此又言以三十二相觀如來邪世有為之説者曰其言不可以相見者謂色即是空也言可以相觀者謂空即是色也愚按此説美矣而有未盡須菩提之意蓋以見與觀不同見者彼與我見也觀者以我觀彼也如來為希有世尊宜示我最上第一希有之法豈徒以三十二相示我哉故不可以相見也若以我觀如來則所謂無所從來亦無所去者我何從知之得其相而觀之是亦足矣故欲以三十二相觀如來也子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也是孔氏之徒亦知夫子之道非徒以文章見矣即須菩提所謂不可以三十二相見如來也而鄉黨一篇備記孔子飲食居處衣服之制以示後世則又須菩提所謂以三十二相觀如來矣佛言以三十二相觀如來轉輪聖王則是如來又説偈言若以色見我以音聲求我是人行邪道不能見如來蓋如來所與人見者不在此則人之觀如來者亦當不在此而在須菩提之意則固非前後兩歧也其五第二十七分云須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提莫作是念如來不以具足相故得阿耨多羅三藐三菩提須菩提汝若作是念發阿耨多羅三藐三菩提心者説諸法斷滅莫作是念何以故發阿耨多羅三藐三菩提心者於法不説斷滅相按自第三分云有我相人相衆生相壽者相則非菩薩自此以下皆説無相之義至上第二十六分云若以色見我以言聲求我是人行邪道不能見如來則不啻大聲而疾呼矣乃按此分又言如來以具足相故得阿耨多羅三藐三菩提又言發阿耨多羅三藐三菩提心者於法不説斷滅相則與第十四分所云菩薩應離一切相發阿耨多羅三藐三菩提心者大相背謬矣解者云佛恐人執無棄有令後人入道無門故又有此言蓋相不可執亦不可毀也其説固亦有見然如第十四分云信心清淨則生實相是實相者即是非相固已舉即色即空之旨明以示人諸分中發明此義者不一而足何必又贅此數語邪若謂自此以上明相之不可有自此以下明相之不可無然至三十一分仍云發阿耨多羅三藐三菩提心者於一切法應如是知如是見如是信解不生法相至三十二分又以不取於相四字總結全經是此經首尾無非發明無相之義獨此數言為歧出矣愚反復推求而知此文之有衍字也蓋莫作是念如來不以具足相故此兩句中衍不字何以故發阿耨多羅三藐三菩提心者此兩句中衍何以故三字經云須菩提汝若作是念如來不以具足相故得阿耨多羅三藐三菩提此正言之也又云須菩提莫作是念如來以具足相故得阿耨多羅三藐三菩提此反言之也云須菩提汝若作是念發阿耨多羅三藐三菩提者説諸法斷滅此正言之也又云莫作是念發阿耨多羅三藐三菩提心者於法不説斷滅相此反言之也反復相明無非發明無相之義因誤衍四字遂與經義乖違學者所宜訂正不可曲為之説也
